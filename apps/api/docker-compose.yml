services:
  postgres:
    image: postgres:16-alpine
    container_name: cartpick-db
    environment:
      POSTGRES_USER: cartpick
      POSTGRES_PASSWORD: cartpick
      POSTGRES_DB: cartpick
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartpick"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
